# Attach to the same external network your Traefik container uses.
# Set TRAEFIK_DOCKER_NETWORK in .env to match your server (see .env.example).

name: ai-chat

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3005}
    expose:
      - 3005
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.ai-chat.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.ai-chat.entrypoints=web-secure
networks:
  proxy:
    external: true
