<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <aside id="sideMenu" class="side-menu" aria-label="Chat menu">
      <div class="side-menu-header">
        <h2>Menu</h2>
        <button id="closeMenuButton" class="icon-button icon-button-ghost" type="button" aria-label="Close menu">
          <span aria-hidden="true">✕</span>
        </button>
      </div>

      <section class="side-menu-settings" aria-labelledby="settingsHeading">
        <h3 id="settingsHeading" class="side-menu-subheading">Settings</h3>
        <label class="settings-label" for="settingsModel">Model</label>
        <input
          type="text"
          id="settingsModel"
          class="settings-input"
          name="settingsModel"
          autocomplete="off"
          spellcheck="false"
          placeholder="e.g. openai/gpt-4o-mini"
        />
        <label class="settings-label" for="settingsSystemPrompt">Assistant instructions</label>
        <p class="settings-hint settings-hint-tight">
          Optional. Leave empty for the built‑in preset (concise, friendly web assistant).
        </p>
        <textarea
          id="settingsSystemPrompt"
          class="settings-textarea"
          name="settingsSystemPrompt"
          rows="4"
          autocomplete="off"
          spellcheck="true"
          placeholder="Your instructions (or leave empty for built‑in preset)"
        ></textarea>
        <button type="button" id="saveSettingsButton" class="secondary-button settings-row-button">
          Save settings
        </button>
        <p id="settingsKeyStatus" class="settings-hint"></p>
        <div class="settings-key-actions">
          <button type="button" id="changeApiKeyButton" class="secondary-button">Change API key</button>
          <button type="button" id="removeApiKeyButton" class="danger-button">Remove API key</button>
        </div>
      </section>

      <p class="legacy-nav"><a href="/legacy" class="legacy-nav-link">Legacy / lightweight page</a></p>

      <h3 class="side-menu-subheading">Recent chats</h3>
      <ul id="recentList" class="archive-list"></ul>
    </aside>
    <div id="menuBackdrop" class="menu-backdrop hidden"></div>

    <main class="chat-layout" aria-label="Chat application">
      <header class="chat-header">
        <button id="menuButton" class="icon-button" type="button" aria-label="Open menu">
          <span class="icon-menu" aria-hidden="true"></span>
        </button>
        <div class="chat-header-brand">
          <h1 class="chat-title">AI Chat</h1>
          <p class="chat-tagline">Assistant in your browser</p>
        </div>
        <button id="newChatButton" type="button" class="header-action-btn" aria-label="New chat">
          <span class="header-action-icon" aria-hidden="true">+</span>
          <span class="header-action-text">New</span>
        </button>
      </header>

      <section id="chatLog" class="chat-log" aria-live="polite"></section>

      <div id="composerWrap" class="composer-wrap">
        <form id="chatForm" class="chat-form">
          <label class="sr-only" for="messageInput">Type your message</label>
          <div class="composer-field">
            <textarea
              id="messageInput"
              name="message"
              placeholder="Message…"
              rows="1"
              required
            ></textarea>
            <button id="sendButton" type="submit" class="send-fab" aria-label="Send message">
              <span aria-hidden="true">↑</span>
            </button>
          </div>
        </form>
      </div>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
